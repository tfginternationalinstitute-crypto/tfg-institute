<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Étudiant | TFG International Institute</title>
    <style>
        :root { --gold: #D4AF37; --navy: #001533; --dark: #000d1a; --white: #ffffff; }
        body { font-family: sans-serif; background: var(--dark); color: var(--white); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: var(--gold); font-size: 1.4rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 14px; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #dashboard { display: none; text-align: left; }
        .support-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        .session-info { background: rgba(212, 175, 55, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8rem; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen" class="glass-card">
        <h1 style="margin-bottom:5px;">TFG INSTITUTE</h1>
        <p style="font-size:0.8rem; opacity:0.7; margin-bottom:20px;">Espace Étudiant Sécurisé</p>
        <input type="text" id="etu-prenom" placeholder="Votre Prénom">
        <input type="password" id="etu-code" placeholder="Code TFG (ex: 1234)">
        <button class="btn-gold" onclick="etuLogin()">SE CONNECTER</button>
        <p style="font-size:0.7rem; margin-top:15px; opacity:0.5;">Besoin d'aide ? Contactez le +237 674 373 396</p>
    </div>

    <div id="dashboard" class="glass-card">
        <h2 id="etu-nom" style="color:var(--gold); margin-top:0;">Bienvenue !</h2>
        
        <div id="etu-session" class="session-info">
            </div>

        <div style="margin-bottom:10px; font-weight:bold; font-size:0.9rem;">📚 Vos supports de cours :</div>
        <div id="etu-supports-list">
            </div>

        <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; margin-top:20px; font-size:0.8rem; width:100%;">❌ Se déconnecter</button>
    </div>

    <script>
        // DONNÉES MULTI-LANGUES DE TFG
        var SUPPORTS = {
            fr:['📄 Fascicule TCF/DELF','🎵 Audio MP3','📹 Vidéo Expression Orale','📋 Fiches Grammaire','✅ 200 Exercices TCF'],
            en:['📄 IELTS Study Guide','🎵 Listening MP3','📹 Speaking Videos','📋 Grammar Sheets','✅ 200 IELTS Exercises'],
            de:['📄 Goethe Lernheft','🎵 Hören Audio','📹 Sprechen Video','📋 Grammatiktabellen','✅ 200 Übungen'],
            es:['📄 Manual DELE','🎵 Audio Comprensión','📹 Video Oral','📋 Fichas Gramática','✅ 200 Ejercicios'],
            it:['📄 Manuale CILS','🎵 Audio Comprensione','📹 Video Orale','📋 Schede Grammatica','✅ 200 Esercizi'],
            ru:['📄 Учебник ТРКИ','🎵 Аудио','📹 Видео','📋 Грамматика','✅ 200 упражнений'],
            zh:['📄 HSK 教材','🎵 听力 MP3','📹 口语视频','📋 语法表','✅ 200道练习']
        };

        var SESSIONS = {
            fr:'Samedi 5 Avril · 09h00-12h00', en:'Samedi 5 Avril · 14h00-17h00',
            de:'Samedi 12 Avril · 09h00-12h00', es:'Samedi 12 Avril · 14h00-17h00',
            it:'Samedi 19 Avril · 09h00-12h00', ru:'Samedi 19 Avril · 14h00-17h00', zh:'Samedi 26 Avril · 09h00-12h00'
        };

        function etuLogin() {
            var prenom = document.getElementById('etu-prenom').value.trim();
            var code = document.getElementById('etu-code').value.trim();
            
            // CODES ADMIN / TEST
            var ADMIN_CODES = ['1234', '9999', '2026'];

            if (prenom === "" || code === "") {
                alert("Veuillez remplir les deux champs.");
                return;
            }

            // Vérification (On simule la recherche étudiant ou code admin)
            if (ADMIN_CODES.includes(code)) {
                afficherEspace(prenom, 'fr'); // Par défaut en Français pour le test
            } else {
                alert("Code incorrect. Demandez votre code au +237 674 373 396");
            }
        }

        function afficherEspace(prenom, lang) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('etu-nom').innerText = "Bienvenue, " + prenom + " ! 👋";
            
            // Affichage de la session
            document.getElementById('etu-session').innerHTML = "<b>Prochaine Session :</b><br>" + (SESSIONS[lang] || SESSIONS['fr']);

            // Affichage des supports
            var supports = SUPPORTS[lang] || SUPPORTS['fr'];
            var html = supports.map(s => `
                <div class="support-item">
                    <span>${s}</span>
                    <a href="https://wa.me/237674373396?text=Bonjour, je souhaite recevoir : ${s}" target="_blank" style="color:var(--gold); text-decoration:none; font-weight:bold;">Accéder →</a>
                </div>
            `).join('');
            document.getElementById('etu-supports-list').innerHTML = html;
        }
    </script>
</body>
</html>
